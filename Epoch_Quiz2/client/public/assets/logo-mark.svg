<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#354024"/>
      <stop offset="1" stop-color="#2A3319"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- E letterform: left spine -->
  <rect x="14" y="13" width="7" height="38" rx="3.5" fill="#E5D7C4"/>
  <!-- Top bar -->
  <rect x="21" y="13" width="28" height="8" rx="4" fill="#E5D7C4"/>
  <!-- Middle bar (slightly shorter, slightly transparent) -->
  <rect x="21" y="28" width="19" height="7" rx="3.5" fill="#CFBB99"/>
  <!-- Bottom bar -->
  <rect x="21" y="43" width="24" height="8" rx="4" fill="#E5D7C4"/>

  <!-- Moss green accent dot -->
  <circle cx="50" cy="16" r="3" fill="#889063" opacity="0.70"/>
</svg>

# Serves the built SPA and reverse-proxies the API to the node service.
# The client calls the API at the relative path /api/v1 (see src/lib/api.ts),
# so both live on the same origin here — no CORS involved.

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # gzip for text assets
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # API → node backend. `proxy_pass` without a URI path preserves the full
  # original request URI, so /api/v1/... reaches the server unchanged.
  location /api/ {
    proxy_pass http://server:3000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    client_max_body_size 25m;   # allow question/image uploads
  }

  # Long-cache fingerprinted build assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback — every other path returns index.html so the hash router
  # (and any deep link) resolves on the client.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
